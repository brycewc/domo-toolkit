<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lineage Explorer - DAG Viewer</title>
    
    <!-- Import Map for ES Modules -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react/": "https://esm.sh/react@18.2.0/",
            "react-dom": "https://esm.sh/react-dom@18.2.0",
            "react-dom/": "https://esm.sh/react-dom@18.2.0/",
            "htm": "https://esm.sh/htm@3.1.1",
            "htm/react": "https://esm.sh/htm@3.1.1/react?external=react",
            "@xyflow/react": "https://esm.sh/@xyflow/react@12.0.0?external=react,react-dom",
            "@dagrejs/dagre": "https://esm.sh/@dagrejs/dagre@1.0.4"
        }
    }
    </script>
    
    <!-- React Flow Styles -->
    <link rel="stylesheet" href="https://esm.sh/@xyflow/react@12.0.0/dist/style.css" />
    <!-- App Styles -->
    <link rel="stylesheet" href="css/main.css" />
</head>
<body>
    <div id="root"></div>
    
    <!-- Domo's ryuu.js (exposes global `domo` object) -->
    <script src="https://unpkg.com/ryuu.js"></script>
    
    <!-- cronstrue for human-readable CRON expressions -->
    <script src="https://cdn.jsdelivr.net/npm/cronstrue@latest/dist/cronstrue.min.js"></script>
    
    <!-- App entry point as ES Module -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
