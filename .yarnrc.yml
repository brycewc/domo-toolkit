approvedGitRepositories:
  - "**"

enableScripts: true

nodeLinker: node-modules

# Retroactively mark upstream peer dependencies as optional so Yarn's
# YN0086 warning stops firing for peers that don't apply to this stack.
# - @react-types/color is HeroUI's transitive type package; it asks for
#   Adobe's @react-spectrum/provider, which HeroUI replaces.
# - @typescript-eslint/utils asks for typescript, but this project is
#   pure JS and never installs TS.
packageExtensions:
  "@react-types/color@*":
    peerDependenciesMeta:
      "@react-spectrum/provider":
        optional: true
  "@typescript-eslint/project-service@*":
    peerDependenciesMeta:
      typescript:
        optional: true
  "@typescript-eslint/tsconfig-utils@*":
    peerDependenciesMeta:
      typescript:
        optional: true
  "@typescript-eslint/typescript-estree@*":
    peerDependenciesMeta:
      typescript:
        optional: true
  "@typescript-eslint/utils@*":
    peerDependenciesMeta:
      typescript:
        optional: true
  "ts-api-utils@*":
    peerDependenciesMeta:
      typescript:
        optional: true
